<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Her Lens · 女性主角游戏</title>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js">
    </script>
    <style>
        /* ===== 全局变量 & 主题 ===== */
        :root {
            --bg: #f3eff7;
            --surface: #faf7fd;
            --surface2: #f6f2fa;
            --text: #3d3546;
            --text2: #665c72;
            --text3: #8c8099;
            --border: #d5cfe0;
            --accent: #9b8abd;
            --accent2: #7e6fa0;
            --tag-bg: #ede7f2;
            --tag-text: #5a4e66;
            --tag-active-bg: #9b8abd;
            --tag-active-text: #fff;
            --shadow: 0 2px 12px rgba(60, 30, 80, 0.08);
            --shadow-lg: 0 8px 40px rgba(60, 30, 80, 0.15);
            --overlay: rgba(30, 15, 40, 0.6);
            --card-hover: #f5f0f9;
            --filter-bg: #faf7fd;
            --modal-bg: #faf7fd;
            --input-bg: #f5f0f9;
            --danger: #c0392b;
            --success: #5d8a5e;
            --chip-del: #d4a0c0;
            --scrollbar-thumb: #d0c4d8;
            --scrollbar-track: #f3eff7;
            --logo-gradient: linear-gradient(135deg, #9b8abd 0%, #7e6fa0 100%);
            --view-tab-active: #9b8abd;
            --view-tab-text: #fff;
            --glass-bg-light: rgba(237, 231, 242, 0.65);
            --glass-bg-dark: rgba(44, 37, 46, 0.7);
            --coin-color: #f5b342;
            --sort-active-bg: #9b8abd;
            --sort-active-text: #fff;
            --sync-status-bg: #f1f0f3;
            --sync-status-text: #3d3546;
        }

        [data-theme="dark"] {
            --bg: #1e1822;
            --surface: #2a2330;
            --surface2: #302836;
            --text: #e2dae8;
            --text2: #b8a9c4;
            --text3: #8c7d9a;
            --border: #453c4e;
            --accent: #b8a2d6;
            --accent2: #9e8abf;
            --tag-bg: #362f3e;
            --tag-text: #c4b5d3;
            --tag-active-bg: #b8a2d6;
            --tag-active-text: #1e1822;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
            --overlay: rgba(0, 0, 0, 0.75);
            --card-hover: #302836;
            --filter-bg: #221c26;
            --modal-bg: #2a2330;
            --input-bg: #302836;
            --danger: #e74c3c;
            --success: #6a9b6c;
            --chip-del: #8b5a6a;
            --scrollbar-thumb: #4a3d55;
            --scrollbar-track: #1e1822;
            --logo-gradient: linear-gradient(135deg, #b8a2d6 0%, #9e8abf 100%);
            --view-tab-active: #b8a2d6;
            --view-tab-text: #1e1822;
            --glass-bg-light: rgba(54, 47, 62, 0.6);
            --glass-bg-dark: rgba(54, 47, 62, 0.7);
            --coin-color: #f5b342;
            --sort-active-bg: #b8a2d6;
            --sort-active-text: #1e1822;
            --sync-status-bg: #2a2330;
            --sync-status-text: #e2dae8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background .3s, color .3s;
            min-height: 100vh;
            line-height: 1.6;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        /* ===== 筛选栏 ===== */
        .filter-sticky {
            background: var(--filter-bg);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px 10px;
            box-shadow: var(--shadow);
            transition: background .3s, border-color .3s;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .filter-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            min-height: 48px;
            position: relative;
        }

        .site-logo {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
            margin-right: 16px;
            line-height: 1.2;
            z-index: 2;
            cursor: default;
            user-select: none;
            position: relative;
        }

        .site-logo::after {
            content: '🔑';
            font-size: 0.6rem;
            position: absolute;
            top: -4px;
            right: -18px;
            opacity: 0;
            transition: opacity 0.3s;
            -webkit-text-fill-color: initial;
            color: var(--text3);
        }

        .site-logo:hover::after {
            opacity: 0.3;
        }

        .header-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            white-space: nowrap;
            z-index: 1;
        }

        .filter-header .site-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: .02em;
        }

        .filter-header .site-subtitle {
            font-size: .9rem;
            color: var(--text2);
            margin-top: 2px;
            font-style: italic;
        }

        /* ===== 视图切换 ===== */
        .view-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 10px;
            justify-content: center;
        }

        .view-tab {
            padding: 8px 22px;
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            transition: all .2s;
            user-select: none;
        }

        .view-tab:first-child {
            border-radius: 20px 0 0 20px;
            border-right: none;
        }

        .view-tab:last-child {
            border-radius: 0 20px 20px 0;
        }

        .view-tab.active {
            background: var(--view-tab-active);
            color: var(--view-tab-text);
            border-color: var(--view-tab-active);
            z-index: 2;
        }

        .view-tab:hover:not(.active) {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ===== 搜索行（保留搜索框，移除文字提示） ===== */
        .search-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 auto 12px;
            max-width: 600px;
            width: 100%;
            padding: 0 4px;
        }

        .search-row .search-input-wrap {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            background: var(--search-bg);
            border: 1.5px solid var(--search-border);
            border-radius: 24px;
            transition: border-color .25s, box-shadow .25s;
            padding: 0 14px;
        }

        .search-row .search-input-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(155, 138, 189, 0.18);
        }

        .search-row .search-input-wrap .search-icon {
            font-size: 1.05rem;
            color: var(--text3);
            margin-right: 8px;
            user-select: none;
            flex-shrink: 0;
        }

        .search-row .search-input-wrap input {
            flex: 1;
            padding: 10px 4px 10px 0;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: .88rem;
            font-family: inherit;
            outline: none;
            min-width: 0;
        }

        .search-row .search-input-wrap input::placeholder {
            color: var(--text3);
            opacity: 0.7;
        }

        .search-row .search-clear-btn {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text3);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s, color .2s;
            padding: 0;
            line-height: 1;
            visibility: hidden;
            opacity: 0;
        }

        .search-row .search-clear-btn.visible {
            visibility: visible;
            opacity: 1;
        }

        .search-row .search-clear-btn:hover {
            background: var(--border);
            color: var(--text);
        }

        /* ===== 筛选按钮 & 面板 ===== */
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .filter-cat-btn {
            padding: 7px 15px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            cursor: pointer;
            font-size: .85rem;
            transition: all .2s;
            white-space: nowrap;
            user-select: none;
            font-weight: 500;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            background: var(--glass-bg-light);
        }

        .filter-cat-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(155, 138, 189, 0.15);
        }

        .filter-cat-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 600;
            backdrop-filter: blur(8px);
        }

        .filter-cat-btn.has-selection {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 0 2px rgba(155, 138, 189, 0.2);
        }

        .filter-options-panel {
            display: none;
            max-height: 220px;
            overflow-y: auto;
            padding: 10px 16px;
            margin-top: 8px;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 6px;
            box-shadow: var(--shadow);
            justify-content: center;
        }

        .filter-options-panel.show {
            display: flex;
        }

        .filter-option-tag {
            padding: 5px 12px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--glass-bg-light);
            color: var(--tag-text);
            cursor: pointer;
            font-size: .78rem;
            transition: all .18s;
            white-space: nowrap;
            user-select: none;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .filter-option-tag:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(155, 138, 189, 0.2);
        }

        .filter-option-tag.selected {
            background: var(--tag-active-bg);
            color: var(--tag-active-text);
            border-color: var(--tag-active-bg);
            font-weight: 600;
            backdrop-filter: blur(8px);
        }

        .active-filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
            align-items: center;
            min-height: 22px;
            justify-content: center;
        }

        .active-filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 12px;
            background: var(--accent);
            color: #fff;
            font-size: .75rem;
            font-weight: 500;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .active-filter-chip .remove-chip {
            cursor: pointer;
            font-weight: 700;
            margin-left: 2px;
            opacity: .8;
            font-size: .85rem;
        }

        .active-filter-chip .remove-chip:hover {
            opacity: 1;
        }

        .clear-all-filters {
            font-size: .75rem;
            color: var(--danger);
            cursor: pointer;
            margin-left: 6px;
            font-weight: 500;
            text-decoration: underline;
            white-space: nowrap;
        }

        .clear-all-filters:hover {
            opacity: .8;
        }

        /* ===== 工具栏 ===== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 12px 20px;
            align-items: center;
            justify-content: space-between;
            max-width: 1400px;
            margin: 0 auto;
        }

        .toolbar-left {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            cursor: pointer;
            font-size: .82rem;
            font-weight: 500;
            transition: all .2s;
            background: var(--surface);
            color: var(--text);
            white-space: nowrap;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-accent {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-accent:hover {
            background: var(--accent2);
            border-color: var(--accent2);
            color: #fff;
        }

        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: #fff;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: .72rem;
            border-radius: 14px;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* 排序按钮 */
        .sort-btn-group {
            display: flex;
            gap: 0;
            border-radius: 14px;
            overflow: hidden;
            border: 1.5px solid var(--border);
        }

        .sort-btn {
            padding: 5px 12px;
            font-size: .72rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: var(--surface);
            color: var(--text2);
            transition: all .2s;
            white-space: nowrap;
        }

        .sort-btn:hover {
            background: var(--card-hover);
            color: var(--accent);
        }

        .sort-btn.active {
            background: var(--sort-active-bg);
            color: var(--sort-active-text);
            font-weight: 600;
        }

        .sort-btn:first-child {
            border-right: 1.5px solid var(--border);
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 1.3rem;
            padding: 6px 10px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--surface);
            transition: all .2s;
            line-height: 1;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            background: var(--card-hover);
        }

        .watermark {
            font-size: 0.75rem;
            color: var(--text3);
            margin-right: 6px;
            font-weight: 500;
            opacity: 0.85;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        .result-count {
            font-size: .82rem;
            color: var(--text3);
            font-weight: 500;
        }

        .result-count strong {
            color: var(--text);
            font-weight: 700;
        }

        /* 打赏按钮 */
        .coin-tip-btn {
            cursor: pointer;
            font-size: 1.4rem;
            padding: 6px 8px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--surface);
            transition: all .25s;
            line-height: 1;
            color: var(--coin-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            user-select: none;
        }

        .coin-tip-btn:hover {
            border-color: var(--coin-color);
            background: rgba(245, 179, 66, 0.12);
            transform: scale(1.08) rotate(-8deg);
            box-shadow: 0 0 16px rgba(245, 179, 66, 0.25);
        }

        .coin-tip-btn:active {
            transform: scale(0.92);
        }

        /* 同步状态 */
        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            color: var(--text3);
            padding: 2px 8px;
            border-radius: 8px;
            background: var(--sync-status-bg);
            white-space: nowrap;
        }

        .sync-status.synced {
            color: var(--success);
        }

        .sync-status.syncing {
            color: var(--accent);
            animation: pulse 1s ease-in-out infinite;
        }

        .sync-status.error {
            color: var(--danger);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* ===== 游戏卡片 ===== */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 20px 40px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
        }

        .gallery-card {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all .25s;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .gallery-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
            background: var(--card-hover);
        }

        .gallery-card .card-cover {
            width: 100%;
            aspect-ratio: 460/215;
            object-fit: cover;
            background: var(--tag-bg);
            display: block;
        }

        .gallery-card .card-cover-placeholder {
            width: 100%;
            aspect-ratio: 460/215;
            background: var(--tag-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text3);
            font-size: 2.5rem;
        }

        .gallery-card .card-body {
            padding: 10px 14px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .gallery-card .card-title {
            font-weight: 700;
            font-size: .95rem;
            color: var(--text);
            line-height: 1.3;
        }

        .gallery-card .card-desc {
            font-size: .75rem;
            color: var(--text2);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .gallery-card .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }

        .gallery-card .card-meta span {
            font-size: .68rem;
            padding: 2px 7px;
            border-radius: 10px;
            background: var(--glass-bg-light);
            color: var(--tag-text);
            white-space: nowrap;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .gallery-card .card-meta span.accent-tag {
            background: var(--accent);
            color: #fff;
            font-weight: 500;
            backdrop-filter: blur(6px);
        }

        .gallery-card .card-admin-actions {
            display: flex;
            gap: 6px;
            padding: 0 14px 10px;
            flex-wrap: wrap;
        }

        .gallery-card .card-admin-actions button {
            font-size: .68rem;
            padding: 4px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            background: var(--surface);
            color: var(--text2);
            transition: all .15s;
        }

        .gallery-card .card-admin-actions button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .gallery-card .card-admin-actions button.btn-del:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .gallery-card .card-admin-actions .edit-locked {
            font-size: .65rem;
            color: var(--text3);
            padding: 4px 8px;
            background: var(--tag-bg);
            border-radius: 8px;
            border: 1px dashed var(--border);
        }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--modal-bg);
            border-radius: 16px;
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            position: relative;
            padding: 28px 24px;
        }

        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text2);
            z-index: 10;
            background: var(--modal-bg);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            transition: all .2s;
            margin-left: 8px;
            margin-bottom: 4px;
        }

        .modal-close:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        .modal .detail-cover {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 16px;
            background: var(--tag-bg);
        }

        .modal .detail-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .modal .detail-section {
            margin: 12px 0;
        }

        .modal .detail-section h3 {
            font-size: .9rem;
            color: var(--accent);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .modal .detail-tags {
            display: flex;

            const TABLE_NAME = 'games';

            function getSupabase() {
                if (!supabaseClient || !SUPABASE_ENABLED) return null;
                return supabaseClient;
            }

            function setSyncStatus(status, msg) {
                const el = document.getElementById('syncStatus');
                if (!el) return;
                el.className = 'sync-status';
                if (status === 'synced') {
                    el.classList.add('synced');
                    el.textContent = '☁️ 已同步';
                } else if (status === 'syncing') {
                    el.classList.add('syncing');
                    el.textContent = '⏳ 同步中…';
                } else if (status === 'error') {
                    el.classList.add('error');
                    el.textContent = '⚠️ ' + (msg || '同步失败');
                } else { el.textContent = '☁️ ' + (msg || '就绪'); }
            }

            async function loadFromSupabase() {
                const client = getSupabase();
                if (!client) return null;

                setSyncStatus('syncing');
                syncError = false;

                try {
                    const { data, error } = await client
                        .from(TABLE_NAME)
                        .select('*')
                        .order('id', { ascending: true });

                    if (error) {
                        console.error('Supabase 查询错误:', error);
                        syncError = true;
                        setSyncStatus('error', error.message);
                        return null;
                    }

                    if (data && data.length > 0) {
                        const parsed = data.map(row => ({
                            ...row,
                            genre: row.genre || [],
                            gameplay: row.gameplay || [],
                            platforms: row.platforms || [],
                            videos: row.videos || [],
                            screenshots: row.screenshots || [],
                            isReleased: row.isReleased !== undefined ? row.isReleased : true,
                            hasDemo: row.hasDemo || false,
                            isPSExclusive: row.isPSExclusive || false,
                            isNSExclusive: row.isNSExclusive || false,
                            id: row.id || Date.now() + Math.random() * 1000,
                        }));
                        setSyncStatus('synced');
                        return parsed;
                    }
                    setSyncStatus('synced');
                    return null;
                } catch (e) {
                    console.error('Supabase 加载异常:', e);
                    syncError = true;
                    setSyncStatus('error', e.message || '网络异常');
                    return null;
                }
            }

            async function saveToSupabase(gameList) {
                const client = getSupabase();
                if (!client) return false;

                setSyncStatus('syncing');

                try {
                    const { error: delError } = await client
                        .from(TABLE_NAME)
                        .delete()
                        .neq('id', 0);

                    if (delError) {
                        console.error('Supabase 删除错误:', delError);
                        setSyncStatus('error', delError.message);
                        return false;
                    }

                    const toInsert = gameList.map(g => ({
                        ...g,
                        genre: g.genre || [],
                        gameplay: g.gameplay || [],
                        platforms: g.platforms || [],
                        videos: g.videos || [],
                        screenshots: g.screenshots || [],
                    }));

                    const batchSize = 50;
                    for (let i = 0; i < toInsert.length; i += batchSize) {
                        const batch = toInsert.slice(i, i + batchSize);
                        const { error: insError } = await client
                            .from(TABLE_NAME)
                            .insert(batch);

                        if (insError) {
                            console.error('Supabase 插入错误:', insError);
                            setSyncStatus('error', insError.message);
                            return false;
                        }
                    }

                    setSyncStatus('synced');
                    return true;
                } catch (e) {
                    console.error('Supabase 保存异常:', e);
                    setSyncStatus('error', e.message || '保存失败');
                    return false;
                }
            }

            // ===== 🆕 从 Supabase 加载自定义标签 =====
            async function loadCustomTagsFromSupabase() {
                if (!SUPABASE_ENABLED || !supabaseClient) return;

                try {
                    // 约定：用 id = 999999 存储题材，id = 999998 存储玩法
                    const { data: tagData, error } = await supabaseClient
                        .from(TABLE_NAME)
                        .select('id, genre')
                        .in('id', [999999, 999998]);

                    if (!error && tagData) {
                        tagData.forEach(row => {
                            if (row.id === 999999 && row.genre) {
                                customGenres = row.genre; // 直接覆盖
                            }
                            if (row.id === 999998 && row.genre) {
                                customGameplays = row.genre;
                            }
                        });
                        // 同步到 localStorage
                        localStorage.setItem('heroineCustomTags', JSON.stringify({ genres: customGenres, gameplays: customGameplays }));
                        console.log('✅ 自定义标签从云端加载完成');
                    }
                } catch (e) {
                    console.warn('⚠️ 加载自定义标签失败，使用本地缓存', e);
                }
            }

            // ===== 🆕 保存自定义标签到云端 =====
            async function saveCustomTags() {
                // 1. 保存到 localStorage（原有逻辑）
                localStorage.setItem('heroineCustomTags', JSON.stringify({ genres: customGenres, gameplays: customGameplays }));

                // 2. 上传到 Supabase（用两条特殊记录）
                if (SUPABASE_ENABLED && supabaseClient) {
                    try {
                        // 题材记录 (id = 999999)
                        const { error: err1 } = await supabaseClient
                            .from(TABLE_NAME)
                            .upsert({
                                id: 999999,
                                title: '__custom_genres__',
                                genre: customGenres,
                                isReleased: true
                            }, { onConflict: 'id' });

                        // 玩法记录 (id = 999998)
                        const { error: err2 } = await supabaseClient
                            .from(TABLE_NAME)
                            .upsert({
                                id: 999998,
                                title: '__custom_gameplays__',
                                genre: customGameplays,
                                isReleased: true
                            }, { onConflict: 'id' });

                        if (err1 || err2) {
                            console.warn('⚠️ 自定义标签云端同步失败', err1 || err2);
                        } else {
                            console.log('☁️ 自定义标签已同步到云端');
                        }
                    } catch (e) {
                        console.warn('⚠️ 自定义标签上传异常', e);
                    }
                }
            }

            // ===== 加载游戏数据（含自定义标签） =====
            async function loadGames() {
                // 1. 优先尝试从 Supabase 加载（增加 try-catch，防止网络错误导致崩溃）
                if (SUPABASE_ENABLED && supabaseClient) {
                    try {
                        const remoteData = await loadFromSupabase();
                        if (remoteData && remoteData.length > 0) {
                            // 云端有数据，直接使用并缓存到本地
                            games = remoteData;
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(games));
                            console.log('✅ 从 Supabase 加载数据成功');

                            // 🆕 加载自定义标签（从 Supabase）
                            await loadCustomTagsFromSupabase();

                            return games;
                        }
                    } catch (e) {
                        console.warn('⚠️ Supabase 查询失败，尝试本地加载', e);
                    }
                }

                // 2. 从本地存储加载
                const s = localStorage.getItem(STORAGE_KEY);
                if (s) {
                    try {
                        games = JSON.parse(s);
                        if (games && games.length > 0) {
                            console.log('✅ 从本地存储加载数据成功');
                            // 如果 Supabase 可用且云端无数据，把本地数据同步到云端
                            if (SUPABASE_ENABLED && supabaseClient) {
                                try {
                                    const remoteCheck = await loadFromSupabase();
                                    if (!remoteCheck || remoteCheck.length === 0) {
                                        await saveToSupabase(games);
                                        console.log('☁️ 本地数据已同步到 Supabase');
                                    }
                                } catch (e) {
                                    console.warn('⚠️ 云端同步失败，但本地数据保留', e);
                                }
                            }

                            // 🆕 加载自定义标签（从 Supabase）
                            await loadCustomTagsFromSupabase();

                            return games;
                        }
                    } catch (_) {
                        console.warn('⚠️ 本地存储解析失败');
                    }
                }

                // 3. 本地和云端都没有数据，使用默认示例游戏（只有首次部署才会执行）
                console.log('📦 首次启动，插入默认示例游戏');

                    } catch (e) {
                        console.error('❌ 默认数据上传失败，但本地已保存', e);
                    }
                }

                // 🆕 加载自定义标签（从 Supabase）
                await loadCustomTagsFromSupabase();

                return games;
            }

            function gameMatchesSearch(game, query) {
                if (!query) return true;
                const q = query.toLowerCase();
                const fields = [
                    game.title,
                    game.description,
                    game.fullDescription,
                    game.heroineType,
                    game.perspective,
                    game.costumeType,
                    ...(game.genre || []),
                    ...(game.gameplay || []),
                    ...(game.platforms || [])
                ];
                return fields.some(f => f && f.toLowerCase().includes(q));
            }

                const sorted = [...gameList];
                sorted.sort((a, b) => {
                    const dateA = a.releaseDate || '1970-01-01';
                    const dateB = b.releaseDate || '1970-01-01';
                    if (currentSort === 'newest') {
                        return dateB.localeCompare(dateA);
                    } else {
                        return dateA.localeCompare(dateB);
                    }
                });
                return sorted;
            }

                    if (searchQuery && !gameMatchesSearch(game, searchQuery)) return false;
                    for (const [cat, sel] of Object.entries(activeFilters)) {
                        if (sel.size === 0) continue;
                        const field = map[cat]?.field;
                        if (!field) continue;
                        if (cat === 'hasChinese' || cat === 'hasMacSupport' ||
                            cat === 'heroineType' || cat === 'costumeType' || cat === 'perspective') {
                            if (!sel.has(game[field])) return false;
                        } else if (cat === 'hasDemo') {
                            if (!sel.has(game.hasDemo ? '有Demo' : '无Demo')) return false;
                        } else if (cat === 'platforms' || cat === 'genre' || cat === 'gameplay') {
                            const arr = game[field] || [];
                            let ok = false;
                            for (const v of sel) { if (arr.includes(v)) { ok = true; break; } }
                            if (!ok) return false;
                        }
                    }
                    return true;
                });
                return sortGames(filtered);
            }

            function clearAllFilters() {
                Object.values(activeFilters).forEach(s => s.clear());
                activeFilterCat = null;
                updateFilterUI();
                renderGallery();
            }

            function removeFilter(cat, val) {
                if (activeFilters[cat]) activeFilters[cat].delete(val);
                updateFilterUI();
                renderGallery();
            }

            function toggleFilterOption(cat, val) {
                const s = activeFilters[cat];
                if (s.has(val)) s.delete(val);
                else s.add(val);
                updateFilterUI();
                renderGallery();
            }

            // ================================================================
            // 筛选 UI
            // ================================================================
            function updateFilterUI() {
                // === 🆕 强制从 localStorage 加载最新的自定义标签 ===
                loadCustomTags();  // 或者 loadCustomTagsFromSupabase();
                const map = currentView === 'released' ? getReleasedFilterCats() : getUnreleasedFilterCats();
                const row = document.getElementById('filterCategoryRow');
                row.innerHTML = Object.entries(map).map(([cat, info]) => {
                    const has = activeFilters[cat] && activeFilters[cat].size > 0;
                    let cls = 'filter-cat-btn';
                    if (cat === activeFilterCat) cls += ' active';
                    if (has) cls += ' has-selection';
                    return `<button class="${cls}" data-cat="${cat}">${info.label}</button>`;
                }).join('');

                const panel = document.getElementById('filterOptionsPanel');
                if (activeFilterCat && map[activeFilterCat]) {
                    const info = map[activeFilterCat],
                        sel = activeFilters[activeFilterCat];
                    panel.innerHTML = info.options.map(o =>
                        `<span class="filter-option-tag${sel.has(o) ? ' selected' : ''}" data-cat="${activeFilterCat}" data-value="${escapeHTML(o)}">${o}</span>`
                    ).join('');
                    panel.classList.add('show');
                } else {
                    panel.innerHTML = '';
                    panel.classList.remove('show');
                }

                const bar = document.getElementById('activeFiltersBar');
                let chips = [];
                for (const [cat, sel] of Object.entries(activeFilters)) {
                    if (sel.size === 0) continue;
                    const label = map[cat]?.label || cat;
                    sel.forEach(v => chips.push(
                        `<span class="active-filter-chip">${label}: ${v}<span class="remove-chip" data-cat="${cat}" data-value="${escapeHTML(v)}">×</span></span>`
                    ));
                }
                if (chips.length > 0) chips.push('<span class="clear-all-filters" id="clearAllFilters">清除全部筛选</span>');
                bar.innerHTML = chips.join('');

                panel.querySelectorAll('.filter-option-tag').forEach(t =>
                    t.addEventListener('click', function () {
                        toggleFilterOption(this.dataset.cat, this.dataset.value);
                    })
                );
                bar.querySelectorAll('.remove-chip').forEach(c =>
                    c.addEventListener('click', function (e) {
                        e.stopPropagation();
                        removeFilter(this.dataset.cat, this.dataset.value);
                    })
                );
                const clr = document.getElementById('clearAllFilters');
                if (clr) clr.addEventListener('click', clearAllFilters);

                row.querySelectorAll('.filter-cat-btn').forEach(b =>
                    b.addEventListener('click', function () {
                        const c = this.dataset.cat;
                        activeFilterCat = activeFilterCat === c ? null : c;
                        updateFilterUI();
                    })
                );
            }

            // ================================================================
            // 渲染卡片
            // ================================================================
            function renderGallery() {
                const filtered = getFilteredGames();
                const grid = document.getElementById('galleryGrid');
                const no = document.getElementById('noResults');
                const countEl = document.getElementById('resultCount');
                countEl.innerHTML = `共 <strong>${filtered.length}</strong> 款游戏`;

                if (filtered.length === 0) {
                    grid.innerHTML = '';
                    no.style.display = 'block';
                } else {
                    no.style.display = 'none';
                    grid.innerHTML = filtered.map(g => createCardHTML(g)).join('');
                }

                grid.querySelectorAll('.gallery-card').forEach(card => {
                    const id = +card.dataset.gameId;
                    card.addEventListener('click', function (e) {
                        if (e.target.closest('.card-admin-actions')) return;
                        const g = games.find(g => g.id === id);
                        if (g) showDetailModal(g);
                    });
                });

                const hasEdit = isEditor();
                grid.querySelectorAll('.btn-edit-card').forEach(b => {
                    b.style.display = hasEdit && isAdminMode ? '' : 'none';
                });
                grid.querySelectorAll('.btn-del-card').forEach(b => {
                    b.style.display = hasEdit && isAdminMode ? '' : 'none';
                });
                grid.querySelectorAll('.edit-locked').forEach(b => {
                    b.style.display = (hasEdit && isAdminMode) ? 'none' : '';
                });

                if (isAdminMode && hasEdit) {
                    grid.querySelectorAll('.btn-edit-card').forEach(b =>
                        b.addEventListener('click', function (e) {
                            e.stopPropagation();
                            const g = games.find(g => g.id === +this.dataset.gameId);
                            if (g) showEditModal(g);
                        })
                    );
                    grid.querySelectorAll('.btn-del-card').forEach(b =>
                        b.addEventListener('click', function (e) {
                            e.stopPropagation();
                            const id = +this.dataset.gameId;
                            if (confirm('确定删除吗？')) {
                                games = games.filter(g => g.id !== id);

                            }
                        })

            function refreshTagPanel(modal, panelId, field, options, selectedValues, defaultOptions) {
                const panel = modal.querySelector('#' + panelId);
                if (!panel) return;
                const defaultSet = new Set(defaultOptions || []);
                panel.innerHTML = options.map(o => {
                    const isSelected = selectedValues.includes(o);
                    const isCustom = !defaultSet.has(o);
                    const delBtn = isCustom ?
                        `<span class="del-tag-btn" data-field="${field}" data-value="${escapeHTML(o)}" title="删除此自定义标签">×</span>` :
                        '';
                    return `<span class="tag-option${isSelected ? ' selected' : ''}" data-field="${field}" data-value="${escapeHTML(o)}">${escapeHTML(o)}${delBtn}</span>`;
                }).join('');
            }

            function deleteCustomTag(field, value, modal, data) {
                if (!confirm(`确定要删除自定义标签“${value}”吗？\n该标签将从所有游戏中移除。`)) return;
                let removed = false;
                if (field === 'genre') {
                    if (removeCustomGenre(value)) removed = true;
                } else if (field === 'gameplay') {
                    if (removeCustomGameplay(value)) removed = true;
                }
                if (!removed) { alert('该标签不是自定义标签，无法删除。'); return; }

                games.forEach(g => {
                    if (field === 'genre') {
                        const idx = g.genre.indexOf(value);
                        if (idx !== -1) g.genre.splice(idx, 1);
                    } else if (field === 'gameplay') {
                        const idx = g.gameplay.indexOf(value);
                        if (idx !== -1) g.gameplay.splice(idx, 1);
                    }
                });
                saveGames();

                if (data) {
                    if (field === 'genre') {
                        const idx = data.genre.indexOf(value);
                        if (idx !== -1) data.genre.splice(idx, 1);
                    } else if (field === 'gameplay') {
                        const idx = data.gameplay.indexOf(value);
                        if (idx !== -1) data.gameplay.splice(idx, 1);
                    }
                }

                const allOpts = field === 'genre' ? getAllGenres() : getAllGameplays();
                const defaultOpts = field === 'genre' ? DEFAULT_GENRE_OPTIONS : DEFAULT_GAMEPLAY_OPTIONS;
                const selected = data ? (field === 'genre' ? data.genre : data.gameplay) : [];
                refreshTagPanel(modal, field === 'genre' ? 'efGenrePanel' : 'efGameplayPanel', field, allOpts, selected,
                    defaultOpts);
                updateFilterUI();
            }

            function bindEditFormEvents(modal, data) {
                refreshTagPanel(modal, 'efGenrePanel', 'genre', getAllGenres(), data.genre || [], DEFAULT_GENRE_OPTIONS);
                refreshTagPanel(modal, 'efGameplayPanel', 'gameplay', getAllGameplays(), data.gameplay || [],
                    DEFAULT_GAMEPLAY_OPTIONS);

                modal.querySelectorAll('.tag-select-panel').forEach(p => {
                    p.addEventListener('click', function (e) {
                        const delBtn = e.target.closest('.del-tag-btn');
                        if (delBtn) {
                            const field = delBtn.dataset.field;
                            const value = delBtn.dataset.value;
                            deleteCustomTag(field, value, modal, data);
                            e.stopPropagation();
                            return;
                        }
                        const t = e.target.closest('.tag-option');
                        if (t) t.classList.toggle('selected');
                    });
                });

                modal.querySelector('#btnAddGenre').addEventListener('click', function () {
                    const inp = modal.querySelector('#efNewGenre');
                    const tag = inp.value.trim();
                    if (!tag) return;
                    if (addCustomGenre(tag)) {
                        if (!data.genre.includes(tag)) data.genre.push(tag);
                        const sorted = getAllGenres().sort((a, b) => a.localeCompare(b, 'zh'));
                        refreshTagPanel(modal, 'efGenrePanel', 'genre', sorted, data.genre, DEFAULT_GENRE_OPTIONS);
                        inp.value = '';
                        updateFilterUI();
                    } else alert('标签已存在或无效');
                });
                modal.querySelector('#btnAddGameplay').addEventListener('click', function () {
                    const inp = modal.querySelector('#efNewGameplay');
                    const tag = inp.value.trim();
                    if (!tag) return;
                    if (addCustomGameplay(tag)) {
                        if (!data.gameplay.includes(tag)) data.gameplay.push(tag);
                        const sorted = getAllGameplays().sort((a, b) => a.localeCompare(b, 'zh'));
                        refreshTagPanel(modal, 'efGameplayPanel', 'gameplay', sorted, data.gameplay,
                            DEFAULT_GAMEPLAY_OPTIONS);
                        inp.value = '';
                        updateFilterUI();
                    } else alert('标签已存在或无效');
                });

                modal.querySelector('#efIsReleased')?.addEventListener('change', function () {
                    toggleReleasedFields(modal, this.checked);
                });
                modal.querySelector('#btnFetchCover')?.addEventListener('click', function () {
                    const id = modal.querySelector('#efSteamAppId')?.value.trim();
                    if (!id) { alert('请输入App ID'); return; }
                    const url =
                        `https://shared.cloudflare.steamstatic.com/store_item_assets/steam/apps/${id}/header.jpg`;
                    modal.querySelector('#efCover').value = url;
                    const prev = modal.querySelector('#coverPreview');
                    if (prev) prev.src = url;
                });
                modal.querySelector('#btnUploadCover')?.addEventListener('click', () => modal.querySelector('#efCoverFile')
                    .click());
                modal.querySelector('#efCoverFile')?.addEventListener('change', function () {
                    const f = this.files[0];
                    if (!f) return;
                    const r = new FileReader();
                    r.onload = function (e) {
                        modal.querySelector('#efCover').value = e.target.result;
                        const prev = modal.querySelector('#coverPreview');
                        if (prev) prev.src = e.target.result;
                    };
                    r.readAsDataURL(f);
                });
                modal.querySelector('#btnSaveGame')?.addEventListener('click', () => saveGameFromForm(modal));
                modal.querySelector('#btnCancelEdit')?.addEventListener('click', closeEditModal);
                modal.querySelector('#btnSmartParse').addEventListener('click', function () {
                    const raw = modal.querySelector('#efSmartPaste').value.trim();
                    if (!raw) return;
                    const parsed = parseGameText(raw);
                    if (parsed.title) modal.querySelector('#efTitle').value = parsed.title;
                    if (parsed.perspective) modal.querySelector('#efPerspective').value = parsed.perspective;
                    if (parsed.heroineType) modal.querySelector('#efHeroineType').value = parsed.heroineType;
                    if (parsed.costumeType) modal.querySelector('#efCostumeType').value = parsed.costumeType;
                    if (parsed.hasChinese) modal.querySelector('#efHasChinese').value = parsed.hasChinese;
                    if (parsed.releaseDate) modal.querySelector('#efReleaseDate').value = parsed.releaseDate;
                    if (parsed.genre.length > 0) {
                        parsed.genre.forEach(g => { if (!data.genre.includes(g)) data.genre.push(g); });
                        refreshTagPanel(modal, 'efGenrePanel', 'genre', getAllGenres(), data.genre,
                            DEFAULT_GENRE_OPTIONS);
                    }
                    if (parsed.gameplay.length > 0) {
                        parsed.gameplay.forEach(g => { if (!data.gameplay.includes(g)) data.gameplay.push(g); });
                        refreshTagPanel(modal, 'efGameplayPanel', 'gameplay', getAllGameplays(), data.gameplay,
                            DEFAULT_GAMEPLAY_OPTIONS);
                    }
                    if (parsed.platforms.length > 0) {
                        const panel = modal.querySelector('#efPlatformsPanel');
                        if (panel) {
                            panel.querySelectorAll('.tag-option').forEach(t => {
                                t.classList.toggle('selected', parsed.platforms.includes(t.dataset.value));
                            });
                        }
                    }
                    alert('智能识别完成，请核对并补充其他信息。');
                });
            }

            function parseGameText(text) {
                const result = {
                    title: '', genre: [], gameplay: [], platforms: [], heroineType: '', costumeType: '',
                    perspective: '', hasChinese: '', releaseDate: ''
                };
                const titleMatch = text.match(/《(.+?)》/);
                if (titleMatch) result.title = titleMatch[1].trim();
                else {
                    const lines = text.split('\n').filter(l => l.trim());
                    if (lines.length > 0) result.title = lines[0].trim();
                }
                const allGenres = getAllGenres(),
                    allGameplays = getAllGameplays();
                for (const g of allGenres)
                    if (text.includes(g)) result.genre.push(g);
                for (const g of allGameplays)
                    if (text.includes(g)) result.gameplay.push(g);
                for (const p of PLATFORM_OPTIONS)
                    if (text.includes(p)) result.platforms.push(p);
                for (const h of HEROINE_TYPE_OPTIONS)
                    if (text.includes(h)) result.heroineType = h;
                for (const c of COSTUME_TYPE_OPTIONS)
                    if (text.includes(c)) result.costumeType = c;
                for (const p of PERSPECTIVE_OPTIONS)
                    if (text.includes(p)) result.perspective = p;
                if (text.includes('有中文') || text.includes('支持中文')) result.hasChinese = '有中文';
                else if (text.includes('无中文') || text.includes('不支持中文')) result.hasChinese = '无中文';
                const dateMatch = text.match(/(\d{4}-\d{2}-\d{2})/);
                if (dateMatch) result.releaseDate = dateMatch[1];
                result.genre = [...new Set(result.genre)];
                result.gameplay = [...new Set(result.gameplay)];
                result.platforms = [...new Set(result.platforms)];
                return result;
            }

            function saveGameFromForm(modal) {
                const getVal = id => modal.querySelector('#' + id)?.value.trim() || '';
                const getCheck = id => modal.querySelector('#' + id)?.checked || false;
                const getTags = id => {
                    const p = modal.querySelector('#' + id);
                    return p ? Array.from(p.querySelectorAll('.tag-option.selected')).map(t => t.dataset.value) : [];
                };
                const title = getVal('efTitle');
                if (!title) { alert('请输入游戏名称'); return; }
                const gameData = {
                    id: editingGameId || Date.now(),
                    title,
                    cover: getVal('efCover'),
                    description: getVal('efDescription'),
                    fullDescription: getVal('efFullDescription'),
                    genre: getTags('efGenrePanel'),
                    gameplay: getTags('efGameplayPanel'),
                    perspective: getVal('efPerspective') || '第三人称',
                    releaseDate: getVal('efReleaseDate'),
                    hasChinese: getVal('efHasChinese') || '有中文',
                    platforms: getTags('efPlatformsPanel'),
                    heroineType: getVal('efHeroineType') || '固定女主',
                    costumeType: getVal('efCostumeType') || '服设合理',
                    hasMacSupport: getVal('efHasMacSupport') || '不支持Mac',
                    steamLink: getVal('efSteamLink'),
                    steamAppId: getVal('efSteamAppId'),
                    isPSExclusive: getCheck('efPSExclusive'),
                    isNSExclusive: getCheck('efNSExclusive'),
                    hasDemo: getVal('efHasDemo') === '1',
                    mainStoryDuration: getVal('efMainStoryDuration'),
                    lowestPrice: getVal('efLowestPrice'),
                    videos: getVal('efVideos').split('\n').filter(l => l.trim()),
                    screenshots: getVal('efScreenshots').split('\n').filter(l => l.trim()),
                    otherLinks: getVal('efOtherLinks'),
                    isReleased: getCheck('efIsReleased')
                };
                if (editingGameId) {
                    const idx = games.findIndex(g => g.id === editingGameId);
                    if (idx >= 0) games[idx] = gameData;
                } else games.push(gameData);
                saveGames();
                closeEditModal();
                renderGallery();
                updateFilterUI();
            }

            function toggleReleasedFields(modal, isReleased) {
                const costume = modal.querySelector('#efCostumeGroup'),
                    cmRow = modal.querySelector('#efChineseMacRow');
                const dur = modal.querySelector('#efDurationPriceGroup'),
                    price = modal.querySelector('#efPriceGroup');
                if (costume) costume.style.display = isReleased ? '' : 'none';
                if (cmRow) cmRow.style.display = isReleased ? '' : 'none';
                if (dur) dur.style.display = isReleased ? '' : 'none';
                if (price) price.style.display = isReleased ? '' : 'none';
                const label = modal.querySelector('label[for="efReleaseDate"]');
                if (label) label.textContent = isReleased ? '发售日期' : '预计发售日';
            }

            function closeEditModal() {
                document.getElementById('editModalOverlay').classList.remove('show');
                document.body.style.overflow = '';
                editingGameId = null;
            }

            // ================================================================
            // 密钥验证弹窗
            // ================================================================
            function openKeyModal() {
                const overlay = document.getElementById('keyModalOverlay');
                overlay.classList.add('show');
                document.body.style.overflow = 'hidden';
                document.getElementById('keyInput').value = '';
                document.getElementById('keyMessage').textContent = '';
                document.getElementById('keyInput').focus();
            }

            function closeKeyModal() {
                document.getElementById('keyModalOverlay').classList.remove('show');
                document.body.style.overflow = '';
            }

            function handleKeySubmit() {
                const input = document.getElementById('keyInput').value;
                const msg = document.getElementById('keyMessage');
                if (verifyKey(input)) {
                    msg.className = 'key-success';
                    msg.textContent = '✅ 验证成功！已进入编辑模式。';
                    setTimeout(() => {
                        closeKeyModal();
                        updateUIAfterKeyChange();
                    }, 600);
                } else {
                    msg.className = 'key-error';
                    msg.textContent = '❌ 密钥错误，请重试。';
                    document.getElementById('keyInput').value = '';
                    document.getElementById('keyInput').focus();
                }
            }

            // ================================================================
            // 打赏弹窗
            // ================================================================
            function openTipModal() {
                document.getElementById('tipModalOverlay').classList.add('show');
                document.body.style.overflow = 'hidden';
            }

            function closeTipModal() {
                document.getElementById('tipModalOverlay').classList.remove('show');
                document.body.style.overflow = '';
            }

            // ================================================================
            // 工具函数
            // ================================================================
            function escapeHTML(s) {
                const d = document.createElement('div');
                d.textContent = s || '';
                return d.innerHTML;
            }

            // ================================================================
            // CSV 导入
            // ================================================================
            function importCSV(file) {
                if (!isEditor()) {
                    alert('请先验证密钥以导入数据。');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function (ev) {
                    const csvData = ev.target.result;
                    const results = Papa.parse(csvData, { header: true, skipEmptyLines: true, trimHeaders: true });
                    if (results.errors && results.errors.length) {
                        alert('CSV 解析出错，请检查文件格式。');
                        console.error(results.errors);
                        return;
                    }
                    const rows = results.data;
                    let added = 0;
                    rows.forEach(row => {
                        const game = parseCSVRow(row);
                        if (game && game.title) {
                            game.isReleased = (currentView === 'released');
                            games.push(game);
                            added++;
                        }
                    });
                    if (added > 0) {
                        saveGames();
                        renderGallery();
                        updateFilterUI();
                        const viewName = currentView === 'released' ? '已发售' : '未发售';
                        alert(`✅ 成功导入 ${added} 款游戏，已归入“${viewName}”列表。`);
                    } else {
                        alert('没有导入任何游戏，请确认 CSV 列名是否匹配（如“游戏名”、“游戏简介”等）。');
                    }
                    document.getElementById('csvFileInput').value = '';
                };
                reader.readAsText(file);
            }

            function parseCSVRow(row) {
                const title = row['游戏名']?.trim();
                if (!title) return null;
                const description = row['游戏简介']?.trim() || '';
                const fullDescription = description;
                const platforms = mapPlatformsFromCSV(row['游玩平台']);
                const genre = splitAndTrim(row['题材']);
                const gameplay = splitAndTrim(row['类型']);
                const perspective = mapPerspective(row['游玩视角']?.trim());
                const hasChinese = mapChinese(row['是否支持中文（简/繁中）']?.trim());
                const heroineType = mapHeroineType(row['主角性别']?.trim());
                const releaseDate = formatDate(row['发售日']?.trim());
                const costumeType = mapCostume(row['服饰是否合理']?.trim());
                const lowestPrice = row['史低（含cdk售卖价格）']?.trim() || '';
                const hasDemo = row['Demo试玩']?.trim() === '有' ? true : false;
                const mainStoryDuration = row['主线通关时长']?.trim() || '';
                return {
                    id: Date.now() + Math.random() * 1000,
                    title,
                    description,
                    fullDescription,
                    genre,
                    gameplay,
                    perspective,
                    hasChinese,
                    heroineType,
                    releaseDate,
                    costumeType,
                    lowestPrice,
                    hasDemo,
                    mainStoryDuration,
                    platforms,
                    cover: '',
                    steamLink: '',
                    steamAppId: '',
                    isPSExclusive: false,
                    isNSExclusive: false,
                    hasMacSupport: '',
                    videos: [],
                    screenshots: [],
                    otherLinks: '',
                    isReleased: true
                };
            }

            function mapPlatformsFromCSV(raw) {
                if (!raw) return [];
                const parts = raw.split(',').map(s => s.trim());
                const mapped = [];
                for (let p of parts) {
                    p = p.toLowerCase();
                    if (p === 'steam' || p === 'pc') mapped.push('PC');
                    else if (p === 'ps4' || p === 'ps5' || p === 'ps') mapped.push('PS');
                    else if (p === 'xbox one' || p === 'xbox series x|s' || p === 'xbox') mapped.push('Xbox');
                    else if (p === 'switch' || p === 'nintendo switch') mapped.push('Nintendo Switch');
                    else if (p === '移动端' || p === 'mobile') mapped.push('移动端');
                    else if (p === 'ns1') mapped.push('NS1');
                    else if (p === 'ns2') mapped.push('NS2');
                    else if (p === '全平台') mapped.push('全平台');
                    else if (p === 'nds' || p === '3ds' || p === 'nds/3ds') mapped.push('nds/3ds');
                    else mapped.push(p);
                }
                return [...new Set(mapped)];
            }

            function splitAndTrim(str) {
                if (!str) return [];
                return str.split(',').map(s => s.trim()).filter(s => s.length > 0);
            }

            function mapPerspective(v) {
                if (!v) return '第三人称';
                if (v.includes('第一人称')) return '第一人称';
                if (v.includes('第三人称')) return '第三人称';
                if (v.includes('可切换人称') || v.includes('可切换')) return '可切换人称';
                if (v.includes('横版')) return '横版';
                return v;
            }

            function mapChinese(v) {
                if (!v) return '无中文';
                if (v.includes('支持中文')) return '有中文';
                return '无中文';
            }

            function mapHeroineType(v) {
                if (!v) return '固定女主';
                if (v.includes('固定女主')) return '固定女主';
                if (v.includes('双女主')) return '双女主';
                if (v.includes('可选女主')) return '可选女主';
                if (v.includes('多主角') || v.includes('多视角')) return '多主角含女主';
                return v;
            }

            function mapCostume(v) {
                if (!v) return '服设合理';
                if (v.includes('恶俗')) return '含恶俗设计';
                if (v.includes('不合理')) return '服设不合理';
                if (v.includes('可自选')) return '服设可自选';
                return '服设合理';
            }

            function formatDate(v) {
                if (!v) return '';
                let d = v.replace(/\//g, '-');
                if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
                try {
                    const parts = d.split('-');
                    if (parts.length === 3) {
                        const year = parts[0].padStart(4, '0');
                        const month = parts[1].padStart(2, '0');
                        const day = parts[2].padStart(2, '0');
                        return `${year}-${month}-${day}`;
                    }
                } catch (_) { }
                return d;
            }

            // ================================================================
            // 全局事件绑定
            // ================================================================
            function bindGlobalEvents() {
                document.getElementById('btnThemeToggle').addEventListener('click', toggleTheme);
                document.getElementById('btnToggleAdmin').addEventListener('click', toggleAdminMode);

                document.getElementById('btnAddGame').addEventListener('click', function () {
                    if (!isEditor()) { alert('请先验证密钥以添加游戏。'); return; }
                    showEditModal(null);
                });

                document.getElementById('btnImportCSV').addEventListener('click', function () {
                    if (!isEditor()) { alert('请先验证密钥以导入数据。'); return; }
                    document.getElementById('csvFileInput').click();
                });
                document.getElementById('csvFileInput').addEventListener('change', function (e) {
                    const file = this.files[0];
                    if (!file) return;
                    importCSV(file);
                });

                document.querySelectorAll('.view-tab').forEach(t =>
                    t.addEventListener('click', function () { switchView(this.dataset.view); })
                );

                document.querySelectorAll('.sort-btn').forEach(btn => {
                    btn.addEventListener('click', function () {
                        setSort(this.dataset.sort);
                    });
                });

                // 搜索输入事件
                const searchInput = document.getElementById('searchInput');
                const clearBtn = document.getElementById('searchClearBtn');
                searchInput.addEventListener('input', function () { setSearchQuery(this.value); });
                clearBtn.addEventListener('click', function () {
                    searchInput.value = '';
                    setSearchQuery('');
                    searchInput.focus();
                });
                searchInput.addEventListener('keydown', function (e) {
                    if (e.key === 'Escape') {
                        this.value = '';
                        setSearchQuery('');
                        this.blur();
                    }
                });

                document.addEventListener('keydown', function (e) {
                    if (e.key === 'Escape') {
                        closeDetailModal();
                        closeEditModal();
                        closeKeyModal();
                        closeTipModal();
                    }
                });

                document.getElementById('btnTip').addEventListener('click', openTipModal);
                document.getElementById('tipModalClose').addEventListener('click', closeTipModal);
                document.getElementById('tipModalOverlay').addEventListener('click', function (e) {
                    if (e.target === this) closeTipModal();
                });

                // ---- 密钥验证 ----
                document.getElementById('siteLogo').addEventListener('dblclick', function (e) {
                    e.preventDefault();
                    if (isEditor()) {
                        alert('✅ 当前已处于编辑模式。\n如需退出，请关闭浏览器标签页或清除会话数据。');
                        return;
                    }
                    openKeyModal();
                });

                document.getElementById('keyModalClose').addEventListener('click', closeKeyModal);
                document.getElementById('keyModalOverlay').addEventListener('click', function (e) {
                    if (e.target === this) closeKeyModal();
                });
                document.getElementById('keyConfirmBtn').addEventListener('click', handleKeySubmit);
                document.getElementById('keyInput').addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        handleKeySubmit();
                    }
                });

                updateFilterUI();
            }

            // ================================================================
            // 初始化
            // ================================================================
            async function init() {
                loadCustomTags();
                loadSettings();

                checkKeyStatus();

                await loadGames();

                resetActiveFilters();
                updateUIAfterKeyChange();
                updateAdminUI();
                bindGlobalEvents();
                renderGallery();
                updateFilterUI();
                document.getElementById('siteTitle').textContent = '🎮 女性主角游戏';

                console.log('✅ Her Lens 初始化完成');
                console.log(`📊 共加载 ${games.length} 款游戏`);
                console.log(`🔑 编辑模式: ${isEditor() ? '已激活' : '未激活'}`);
                console.log(`☁️ Supabase: ${SUPABASE_ENABLED && supabaseClient ? '已连接' : '未连接'}`);
            }

            init();
        })();
    </script>
